# command :
# python -m torch.distributed.run --nproc_per_node=1 --master_port=29050 main.py --cfg_file ./results/pretrain_ref/pretrain_ref.yaml > output/pretrain_ref

TASK :
    PRETRAIN : True
    HPP_WAY : "HPP"
    REF : True
    DIFF_WAY : "Subtraction"
    DIFF_TYPE : "Skeleton"
    PROJ_STRATEGY : "TIME_POOL"

DATA: 
    TRAIN : "dataset/humanml3D_train.pkl"
    TEST : "dataset/humanml3D_test.pkl"
    BATCH_SIZE: 2

OPTIMIZER:
    LR : 1e-4
    MAX_EPOCH : 1
    WARMUP_STEPS : 10

LOGDIR : "./results/pretrain_ref"
LOSS : "PerGT"
DEBUG : False
SETTING : "NO_SEGMENT"
EVAL :
    score : True
    ckpt : "None"